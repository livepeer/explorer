name: Bug Report
description: Report a bug or unexpected behavior in our project.
labels: ["needs-triage"]
type: bug

body:
  - type: markdown
    attributes:
      value: |
        **Thanks for reporting a bug!**
        Please fill out the details below to help us reproduce and resolve it quickly.

  - type: textarea
    id: describe-bug
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Describe the issue here...
    validations:
      required: true

  - type: textarea
    id: to-reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: Describe what should have happened instead.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
      placeholder: Paste image links or upload screenshots here.

  # Desktop Section
  - type: input
    id: desktop-os
    attributes:
      label: Desktop OS
      description: e.g. macOS, Windows, Linux
      placeholder: ex. macOS Ventura 13.4
  - type: input
    id: desktop-browser
    attributes:
      label: Desktop Browser
      description: e.g. Chrome, Safari, Edge
      placeholder: ex. Chrome 122.0.0
  - type: input
    id: desktop-wallet
    attributes:
      label: Desktop Wallet
      description: Which wallet are you using?
      placeholder: ex. MetaMask, Rabby, Phantom
  - type: input
    id: desktop-version
    attributes:
      label: Desktop App/Extension Version
      placeholder: ex. v1.2.3

  # Smartphone Section
  - type: input
    id: smartphone-device
    attributes:
      label: Smartphone Device
      description: e.g. iPhone 14, Pixel 7
      placeholder: ex. iPhone 14
  - type: input
    id: smartphone-os
    attributes:
      label: Smartphone OS
      description: e.g. iOS 17.1, Android 14
      placeholder: ex. iOS 17.1
  - type: input
    id: smartphone-browser
    attributes:
      label: Smartphone Browser
      description: e.g. Safari, Chrome, Brave
      placeholder: ex. Safari
  - type: input
    id: smartphone-wallet
    attributes:
      label: Smartphone Wallet
      description: Which wallet are you using on mobile?
      placeholder: ex. MetaMask, Rainbow, Coinbase Wallet
  - type: input
    id: smartphone-version
    attributes:
      label: Smartphone App/Extension Version
      placeholder: ex. v1.2.3

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here. If this issue is retroactively compensated, remove the `<!--` and `-->` markers from the block below so the notice appears in the published issue.
      value: |
        <!--
        ## Retroactive Grant Notice

        > [!IMPORTANT]
        > Compensation cap: **[FILL IN AMOUNT]**

        Before picking this up, read the [Retroactive Grants post](https://forum.livepeer.org/t/about-the-retroactive-grant-applications-category/3250/2?u=mehrdad) in full. Key points:

        - **Not pay-for-delivery.** Compensation is based on demonstrated adoption and community impact — not on shipping. Real, named community contributors must use your work and publicly attest to it. Building in isolation, then asking for a grant, does not qualify.
        - **Talk to the community first.** A public discussion (Discord or Forum) about the problem must precede the work, and evidence of it must be part of your application. No prior discussion, no tempcheck, no public signal = won't pass review.

        **Required steps before investing more time:**
        1. Read the [original Retroactive Grants post](https://forum.livepeer.org/t/about-the-retroactive-grant-applications-category/3250/2?u=mehrdad) in full.
        2. Start a public discussion (Discord or Forum). Get input. Confirm direction.
        3. Secure at least one community proof point — a Discord thread with positive signal, a Review Team acknowledgement, or evidence of active adoption.
        4. Identify, by name, who has this problem.
        5. Build, ship, and confirm it's actually being used.
        6. Apply with at least one named community contributor willing to publicly attest to your work's impact on the forum post.

        Skipping steps 2, 3, 4, or 6 will halt the application. Reach out to **jj.a.ss.o.nn_everestnode** on Discord before you start building.
        -->
