name: CI

on:
  pull_request:
    branches: ['*']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_INFURA_KEY: TEST_INFURA_KEY
      NEXT_PUBLIC_NETWORK: ARBITRUM_ONE
      NEXT_PUBLIC_SUBGRAPH_API_KEY: TEST_SUBGRAPH_KEY

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 📦 Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      - name: 🧹 Run linter
        run: pnpm lint

      - name: 📋 Run typecheck
        run: pnpm typecheck

      - name: 🧪 Run tests
        run: pnpm test
